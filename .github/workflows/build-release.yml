name: Build Release

on:
  push:
    branches: [main]

concurrency:
  group: build-release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pushed commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        run: |
          mkdir -p dist

          for target in linux/amd64 darwin/amd64 darwin/arm64 windows/amd64; do
            IFS='/' read -r goos goarch <<< "$target"
            output="sushi-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              output="${output}.exe"
            fi

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -o "dist/${output}" ./cmd/sushi
          done

      - name: Determine next version
        id: next_version
        run: |
          latest_tag=$(git tag --list '[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            next_tag="1.0"
          else
            major="${latest_tag%%.*}"
            minor="${latest_tag##*.}"
            next_tag="${major}.$((minor + 1))"
          fi

          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.next_version.outputs.next_tag }}"
          git push origin "${{ steps.next_version.outputs.next_tag }}"

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.next_tag }}
          name: ${{ steps.next_version.outputs.next_tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*
